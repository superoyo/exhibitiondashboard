<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แก้ไขรายชื่อ KOL — Sahagroup KOL Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#f4f6fa; --card:#fff; --line:#e5e7eb; --muted:#64748b; --text:#0f172a; }
    html,body{ background:var(--bg); color:var(--text); font-family:'Noto Sans Thai',system-ui,sans-serif; }
    .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; box-shadow:0 1px 3px rgba(15,23,42,.05); }
    a{ color:#2563eb; }
    .nav{ display:flex; align-items:center; gap:.4rem; flex-wrap:wrap; margin-bottom:1rem; }
    .nav-brand{ font-weight:700; font-size:.95rem; margin-right:.6rem; }
    .navtab{ padding:.4rem .9rem; border-radius:999px; font-size:.85rem; font-weight:600; color:#475569; text-decoration:none; border:1px solid var(--line); background:#fff; }
    .navtab:hover{ background:#eef2f7; }
    .navtab-active{ background:#0f172a; color:#fff; border-color:#0f172a; }
    .seg{ padding:.4rem 1rem; border-radius:999px; font-size:.9rem; font-weight:600; border:1px solid var(--line); background:#fff; cursor:pointer; }
    .seg-active{ background:#0f172a; color:#fff; border-color:#0f172a; }
    .inp{ border:1px solid var(--line); border-radius:8px; padding:.35rem .6rem; font-size:.85rem; width:100%; background:#fff; }
    .btn{ border-radius:8px; padding:.4rem .8rem; font-size:.82rem; font-weight:600; cursor:pointer; border:1px solid var(--line); background:#fff; }
    .btn-primary{ background:#0f172a; color:#fff; border-color:#0f172a; }
    .btn-danger{ color:#dc2626; border-color:#fecaca; background:#fff; }
    .btn:hover{ filter:brightness(.97); }
    table{ width:100%; border-collapse:collapse; }
    th,td{ padding:.5rem .5rem; text-align:left; font-size:.85rem; border-bottom:1px solid var(--line); vertical-align:middle; }
    th{ color:var(--muted); font-weight:600; white-space:nowrap; }
    .pill{ padding:.1rem .55rem; border-radius:999px; font-size:.7rem; font-weight:600; }
    #toast{ position:fixed; right:1rem; bottom:1rem; z-index:50; display:none; }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-6xl mx-auto px-3 sm:px-5 py-4">

    <!-- Nav -->
    <nav class="nav">
      <a href="/" class="nav-brand">🎯 Campaign Hub</a>
      <a href="/" class="navtab">← Home</a>
      <a href="/kols" class="navtab navtab-active">แก้ไข KOL</a>
      <a href="/token" class="navtab">Apify Token</a>
    </nav>

    <header class="mb-4">
      <h1 class="text-xl sm:text-2xl font-bold">✏️ แก้ไขรายชื่อ KOL</h1>
      <p class="text-sm" style="color:var(--muted)">เพิ่ม / แก้ไข / ปิด-เปิด / ลบ KOL ของแต่ละ dashboard · บันทึกลงฐานข้อมูลทันที</p>
    </header>

    <!-- roster switch (populated from /api/campaigns) -->
    <div id="rosterSwitch" class="flex flex-wrap gap-2 mb-4">
      <span class="text-sm" style="color:var(--muted)">กำลังโหลดแคมเปญ…</span>
    </div>

    <p id="note" class="text-xs mb-3" style="color:var(--muted)"></p>

    <!-- add form -->
    <div class="card p-3 mb-4">
      <div class="text-sm font-semibold mb-2">➕ เพิ่ม KOL ใหม่</div>
      <div class="grid grid-cols-1 sm:grid-cols-4 gap-2">
        <input id="addUser" class="inp" placeholder="username (ไม่ต้องใส่ @)" />
        <input id="addDisplay" class="inp" placeholder="ชื่อแสดง (เว้นว่าง = username)" />
        <input id="addGroup" class="inp" placeholder="กลุ่มใหญ่" list="groupList" />
        <input id="addSub" class="inp" placeholder="กลุ่มย่อย" list="subList" style="display:none" />
        <button id="addBtn" class="btn btn-primary">เพิ่ม</button>
      </div>
      <div id="addUrlWrap" class="mt-2" style="display:none">
        <input id="addUrl" class="inp" placeholder="🔗 ลิงก์โพสต์ TikTok/Facebook ของแคมเปญ (เว้นว่างได้ ใส่ทีหลัง)" />
      </div>
      <datalist id="groupList"></datalist>
      <datalist id="subList"></datalist>
    </div>

    <div class="card p-3">
      <div class="flex items-center justify-between mb-2">
        <div class="text-sm font-semibold" id="countLbl">รายชื่อ KOL</div>
        <button id="reload" class="btn">↻ โหลดใหม่</button>
      </div>
      <div class="overflow-x-auto">
        <table>
          <thead id="thead"></thead>
          <tbody id="rows"><tr><td style="color:var(--muted)">กำลังโหลด…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast" class="card px-4 py-2 text-sm"></div>

<script>
// Groups/subgroups are per-campaign (fetched from /api/campaigns). The Tracker
// (live) roster is separate and keeps its fixed group list.
const TRACKER_GROUPS = ["Fashion","Food","Beauty","Household Items"];
let CAMPAIGN_META = {}; // key -> {name, emoji, groups, subgroups}
function hashColor(c){const P=['#6366f1','#10b981','#ec4899','#f59e0b','#06b6d4','#8b5cf6','#ef4444','#14b8a6'];let h=0;for(const ch of (c||''))h=(h*31+ch.charCodeAt(0))>>>0;return P[h%P.length];}
// Read ?campaign= from URL so links from home/report pages open the right roster
const urlCampaign = new URLSearchParams(location.search).get('campaign') || '';
let roster = urlCampaign==='__tracker' ? 'tracker' : 'report';
let campaign = roster==='tracker' ? '' : (urlCampaign || 'sahagroup');
function groupsFor(){ return roster==='tracker' ? TRACKER_GROUPS : (CAMPAIGN_META[campaign]?.groups || []); }
function subsFor(){ return roster==='tracker' ? [] : (CAMPAIGN_META[campaign]?.subgroups || []); }

const $ = s => document.querySelector(s);
function toast(msg, ok=true){ const t=$("#toast"); t.textContent=(ok?"✅ ":"⚠️ ")+msg; t.style.display="block"; t.style.borderColor=ok?"#bbf7d0":"#fecaca"; clearTimeout(t._t); t._t=setTimeout(()=>t.style.display="none",2600); }
async function api(method, path, body){
  let url = "/api/roster/"+roster+path;
  if(roster==="report") url += (url.includes("?")?"&":"?")+"campaign="+encodeURIComponent(campaign);
  const r = await fetch(url, {method, headers:{"Content-Type":"application/json"}, body: body?JSON.stringify(body):undefined});
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.detail || ("HTTP "+r.status));
  return data;
}
function esc(s){return (s||"").replace(/"/g,'&quot;');}
function hasSub(){ return roster==="report" && subsFor().length>0; }
async function load(){
  const isReport = roster==="report";
  const groups = groupsFor();
  $("#groupList").innerHTML = groups.map(g=>`<option value="${g}">`).join("");
  $("#subList").innerHTML = subsFor().map(g=>`<option value="${g}">`).join("");
  $("#addGroup").value = groups[0] || "";
  $("#addUrlWrap").style.display = isReport ? "block" : "none";
  $("#addSub").style.display = hasSub() ? "" : "none";
  const sub = hasSub();
  $("#thead").innerHTML = `<tr>
    <th>#</th><th>@username</th><th>ชื่อแสดง</th><th>กลุ่มใหญ่</th>${sub?'<th>กลุ่มย่อย</th>':''}${isReport?'<th>🔗 ลิงก์โพสต์</th>':''}<th>สถานะ</th><th class="text-right">จัดการ</th></tr>`;
  const cols = 6 + (sub?1:0) + (isReport?1:0);
  $("#rows").innerHTML = `<tr><td colspan="${cols}" style="color:var(--muted)">กำลังโหลด…</td></tr>`;
  try{
    const {kols} = await api("GET","");
    if(!kols.length){ $("#rows").innerHTML = `<tr><td colspan="${cols}" style="color:var(--muted)">ยังไม่มี KOL — เพิ่มด้านบน</td></tr>`; }
    else $("#rows").innerHTML = kols.map((k,i)=>`
      <tr data-id="${k.id}">
        <td style="color:var(--muted)">${i+1}</td>
        <td class="font-medium">@${k.username}</td>
        <td><input class="inp f-display" value="${esc(k.display)}"></td>
        <td><input class="inp f-group" value="${esc(k.group)}" list="groupList" style="min-width:120px"></td>
        ${sub?`<td><input class="inp f-sub" value="${esc(k.subgroup)}" list="subList" style="min-width:130px"></td>`:''}
        ${isReport?`<td><div class="flex items-center gap-1"><input class="inp f-url" style="min-width:220px" value="${esc(k.url)}" placeholder="วางลิงก์โพสต์ (ใส่ทีหลังได้)"><a href="${k.url||'#'}" target="_blank" title="เปิดโพสต์" class="btn" style="text-decoration:none">↗</a></div></td>`:''}
        <td><label class="flex items-center gap-1 text-xs"><input type="checkbox" class="f-active" ${k.active?"checked":""}> <span class="pill" style="background:${hashColor(k.subgroup||k.group)};color:#fff">${k.active?'active':'ปิด'}</span></label></td>
        <td class="text-right whitespace-nowrap">
          <button class="btn btn-primary act-save">บันทึก</button>
          <button class="btn btn-danger act-del">ลบ</button>
        </td>
      </tr>`).join("");
    $("#countLbl").textContent = `รายชื่อ KOL (${kols.length})`;
  }catch(e){ $("#rows").innerHTML = `<tr><td colspan="${cols}" style="color:#dc2626">โหลดไม่สำเร็จ: ${e.message}</td></tr>`; }
}
$("#rows").addEventListener("click", async (ev)=>{
  const tr = ev.target.closest("tr"); if(!tr) return;
  const id = tr.dataset.id;
  if(ev.target.classList.contains("act-save")){
    try{
      const body = { display: tr.querySelector(".f-display").value, group: tr.querySelector(".f-group").value, active: tr.querySelector(".f-active").checked };
      const subEl=tr.querySelector(".f-sub"); if(subEl) body.subgroup=subEl.value.trim();
      const urlEl=tr.querySelector(".f-url"); if(urlEl) body.url=urlEl.value.trim();
      await api("PATCH","/"+id, body);
      toast("บันทึกแล้ว"); load();
    }catch(e){ toast(e.message,false); }
  }
  if(ev.target.classList.contains("act-del")){
    if(!confirm("ลบ KOL นี้?")) return;
    try{ await api("DELETE","/"+id); toast("ลบแล้ว"); load(); }catch(e){ toast(e.message,false); }
  }
});
$("#addBtn").onclick = async ()=>{
  const username = $("#addUser").value.trim();
  if(!username){ toast("ใส่ username ก่อน",false); return; }
  try{
    const body = {username, display:$("#addDisplay").value.trim(), group:$("#addGroup").value.trim()||groupsFor()[0]};
    if(hasSub()) body.subgroup = $("#addSub").value.trim();
    if(roster==="report") body.url = $("#addUrl").value.trim();
    await api("POST","", body);
    $("#addUser").value=""; $("#addDisplay").value=""; $("#addUrl").value=""; $("#addSub").value="";
    toast("เพิ่มแล้ว"); load();
  }catch(e){ toast(e.message,false); }
};
$("#reload").onclick = load;
function setNote(){
  const label = roster==='tracker' ? 'Tracker (live)' : (CAMPAIGN_META[campaign]?.name || campaign);
  $("#note").innerHTML = roster==="tracker"
    ? "หน้านี้คุม KOL ที่ระบบ scrape live (kols) — แยกจากรายงานแคมเปญ"
    : `📌 แคมเปญ <b>${esc(label)}</b> · ใส่/แก้ <b>ลิงก์โพสต์</b> ของแต่ละ KOL แล้วไปหน้ารายงานกด <b>Refresh Data</b> (ติ๊ก active = รวมในรายงาน)`;
}
function renderRosterSwitch(){
  const buttons = Object.values(CAMPAIGN_META).map(c=>
    `<button class="seg ${roster==='report'&&campaign===c.key?'seg-active':''}" data-roster="report" data-campaign="${esc(c.key)}">${c.emoji||'📊'} ${esc(c.name)}</button>`
  ).join('');
  $("#rosterSwitch").innerHTML = buttons +
    `<button class="seg ${roster==='tracker'?'seg-active':''}" data-roster="tracker" data-campaign="">Tracker (live)</button>`;
  document.querySelectorAll("#rosterSwitch .seg").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#rosterSwitch .seg").forEach(x=>x.classList.remove("seg-active"));
    b.classList.add("seg-active");
    roster = b.dataset.roster; campaign = b.dataset.campaign || "";
    setNote(); load();
  });
}
async function bootstrap(){
  try{
    const d = await (await fetch('/api/campaigns?limit=100')).json();
    CAMPAIGN_META = {}; (d.campaigns||[]).forEach(c=>{ CAMPAIGN_META[c.key]=c; });
    // If URL didn't specify a campaign, land on the newest one
    if(!urlCampaign && Object.keys(CAMPAIGN_META).length){
      const first = d.campaigns[0]; if(first) campaign = first.key;
    }
    // Fallback: campaign in URL but no metadata row -> still allow editing
    if(campaign && !CAMPAIGN_META[campaign]){
      CAMPAIGN_META[campaign] = {key:campaign, name:campaign, emoji:'📊', groups:[], subgroups:[]};
    }
  }catch(e){ toast("โหลดแคมเปญไม่สำเร็จ: "+e.message,false); }
  renderRosterSwitch();
  setNote();
  load();
}
bootstrap();
</script>
</body>
</html>
