<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Influencer Real Time Report</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6fa;--card:#fff;--line:#e5e7eb;--muted:#64748b;--text:#0f172a}
html{background:#fff}
body{background:radial-gradient(125% 88% at 50% 132%,#f6cb38 0%,#fadd6a 18%,#fcea9f 36%,#fef6da 56%,#ffffff 76%) no-repeat fixed;background-color:#fff;color:var(--text);font-family:'Noto Sans Thai',system-ui,sans-serif}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 3px rgba(15,23,42,.05);transition:.15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(15,23,42,.08);border-color:#94a3b8}
a{color:inherit;text-decoration:none}
.nav{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.nav-brand{font-weight:700;font-size:1rem;margin-right:.6rem}
.navtab{padding:.4rem .9rem;border-radius:999px;font-size:.85rem;font-weight:600;color:#475569;border:1px solid var(--line);background:#fff}
.navtab-active{background:#0f172a;color:#fff;border-color:#0f172a}
.navtab:hover{background:#eef2f7}
.btn{border-radius:10px;padding:.55rem 1.1rem;font-weight:700;font-size:.9rem;cursor:pointer;border:1px solid var(--line);background:#fff}
.btn-primary{background:#0f172a;color:#fff;border-color:#0f172a}
.btn-primary:hover{background:#1e293b}
.btn-danger{color:#dc2626;border-color:#fecaca}
.inp{border:1px solid var(--line);border-radius:8px;padding:.5rem .7rem;font-size:.9rem;width:100%;background:#fff}
.chip{display:inline-block;padding:.1rem .55rem;border-radius:999px;font-size:.7rem;font-weight:600;background:#eef2f7;color:#475569;margin:.1rem .15rem 0 0}
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:40}
.modal{background:#fff;border-radius:14px;padding:1.25rem;max-width:520px;width:calc(100vw - 2rem);max-height:calc(100vh - 2rem);overflow:auto}
#toast{position:fixed;right:1rem;bottom:1rem;z-index:50;display:none;background:#fff;border:1px solid var(--line);padding:.55rem 1rem;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.emoji-pick{display:grid;grid-template-columns:repeat(8,1fr);gap:.35rem}
.emoji-pick button{padding:.4rem;border:1px solid var(--line);border-radius:8px;font-size:1.2rem;background:#fff;cursor:pointer}
.emoji-pick button.on{background:#0f172a;border-color:#0f172a}
.del-btn{position:absolute;top:.6rem;right:.6rem;z-index:2;width:32px;height:32px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:.95rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#dc2626;transition:.12s}
.del-btn:hover{background:#fee2e2;border-color:#fecaca}
.del-btn:disabled{opacity:.5;cursor:default}
.edit-btn{position:absolute;top:.6rem;right:2.9rem;z-index:2;width:32px;height:32px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:.9rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#334155;transition:.12s}
.edit-btn:hover{background:#eef2f7;border-color:#94a3b8}
.logo{margin-left:auto;display:flex;flex-direction:column;line-height:.98;font-weight:800;font-size:1rem;color:#0f172a;letter-spacing:-.02em;font-family:system-ui,'Segoe UI',Arial,sans-serif}
.logo .lw{position:relative;display:inline-block}
.logo .ldot{position:absolute;top:.08em;right:-.5em;width:.32em;height:.32em;border-radius:50%;background:#f5c518}
</style></head><body class="min-h-screen">
<div class="max-w-6xl mx-auto px-3 sm:px-5 py-5">
<nav class="nav">
  <span class="nav-brand">🎯 Influencer Real Time Report</span>
  <a href="/" class="navtab navtab-active">Home</a>
  <a href="/token" class="navtab">Apify Token</a>
  <div class="logo" role="img" aria-label="Far East Fame Line">
    <span class="lw">Far<i class="ldot"></i></span>
    <span class="lw">East</span>
    <span class="lw">Fame</span>
    <span class="lw">Line</span>
  </div>
</nav>

<header class="mb-4 flex flex-wrap items-end justify-between gap-3">
  <div>
    <h1 class="text-2xl sm:text-3xl font-bold">Home</h1>
  </div>
  <div class="flex gap-2">
    <button id="newBtn" class="btn btn-primary">+ สร้างแคมเปญใหม่</button>
  </div>
</header>

<!-- search -->
<div class="mb-4">
  <div class="relative">
    <input id="search" class="inp" style="padding-left:2.2rem" placeholder="ค้นหา Campaign report… (พิมพ์ชื่อแคมเปญหรือ key)" autocomplete="off">
    <span style="position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--muted)">🔍</span>
  </div>
  <div id="searchHint" class="text-xs mt-1" style="color:var(--muted)"></div>
</div>

<div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  <div class="card p-6 text-sm" style="color:var(--muted)">กำลังโหลด…</div>
</div>

<!-- Create modal -->
<div id="modalBack" class="modal-back" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="flex items-center justify-between mb-3">
      <h2 id="modalTitle" class="text-lg font-bold">🆕 สร้างแคมเปญใหม่</h2>
      <button id="closeBtn" class="btn" aria-label="ปิด">✕</button>
    </div>
    <div class="grid gap-3">
      <label class="block">
        <span class="text-xs font-semibold" style="color:var(--muted)">ชื่อแคมเปญ (แสดงบนหัวรายงาน)</span>
        <input id="fName" class="inp mt-1" placeholder="เช่น Sahagroup Fair 2028">
      </label>
      <div>
        <span class="text-xs font-semibold" style="color:var(--muted)">Emoji / ไอคอน</span>
        <div id="fEmoji" class="emoji-pick mt-1"></div>
      </div>
      <label class="block">
        <span class="text-xs font-semibold" style="color:var(--muted)">คำอธิบาย (บอกว่าเป็นแคมเปญอะไร)</span>
        <input id="fSub" class="inp mt-1" placeholder="เช่น Mega KOL + Micro-Nano KOL · TikTok/FB">
      </label>
      <label id="fKeyWrap" class="block" style="display:none">
        <span class="text-xs font-semibold" style="color:var(--muted)">รหัส URL (ลิงก์รายงานคือ …/c/&lt;รหัส&gt;)</span>
        <input id="fKey" class="inp mt-1" placeholder="เช่น 00001">
        <span class="text-xs" style="color:var(--muted)">a-z 0-9 หรือ - · ⚠️ เปลี่ยนแล้วลิงก์เดิมของแคมเปญนี้จะเปลี่ยนตาม</span>
      </label>
      <p id="createHint" class="text-xs" style="color:var(--muted)">รหัสแคมเปญ (เช่น 00001) ระบบจะสร้างให้อัตโนมัติตามลำดับ</p>
      <div class="flex items-center justify-end gap-2 mt-2">
        <button id="cancelBtn" class="btn">ยกเลิก</button>
        <button id="createBtn" class="btn btn-primary">สร้าง</button>
      </div>
      <div id="modalErr" class="text-sm" style="color:#dc2626"></div>
    </div>
  </div>
</div>

<div id="toast"></div>
</div>

<script>
const EMOJIS=['📊','🧴','💄','🪥','🦷','👁️','🚿','🧼','🥛','🧃','🍊','☕','🍞','🍬','🥗','🍽️','🍜','🏃','🏋️','💪','🐶','🐱','🧺','👗','🛍️','🎬','🏠','🎮','📱','⚽','✈️','🎨','🎵','📷','🚗','💼'];
let pickedEmoji='📊';
function toast(msg, ok=true){const t=document.getElementById('toast');t.textContent=(ok?'✅ ':'⚠️ ')+msg;t.style.display='block';t.style.borderColor=ok?'#bbf7d0':'#fecaca';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2600);}
function fmt(n){return n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':(''+n);}
function fmtDate(iso){if(!iso)return '';try{return new Date(iso).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});}catch(e){return '';}}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function cardHTML(c){
  const key=esc(c.key), name=esc(c.name);
  return `
    <div class="card relative">
      <button class="edit-btn" data-key="${key}" title="แก้ไขแคมเปญนี้" aria-label="แก้ไขแคมเปญ ${name}">✏️</button>
      <button class="del-btn" data-key="${key}" data-name="${name}" title="ลบแคมเปญนี้" aria-label="ลบแคมเปญ ${name}">🗑</button>
      <a href="/c/${encodeURIComponent(c.key)}" class="block p-5">
        <div class="flex items-start justify-between gap-2" style="padding-right:5rem">
          <div class="text-4xl">${esc(c.emoji||'📊')}</div>
          <div class="text-right">
            <div class="text-xs" style="color:var(--muted)">${fmtDate(c.created_at)}</div>
            <div class="text-xs mt-1" style="color:var(--muted)">${c.roster_count||0} KOLs</div>
          </div>
        </div>
        <div class="mt-2 font-bold text-lg leading-tight">${name}</div>
        <div class="text-xs mt-1" style="color:var(--muted)">/c/${key}</div>
        ${c.subtitle?`<div class="text-sm mt-2" style="color:#334155">${esc(c.subtitle)}</div>`:''}
        <div class="mt-3">${(c.groups||[]).slice(0,4).map(g=>`<span class="chip">${esc(g)}</span>`).join('')}${(c.groups||[]).length>4?`<span class="chip">+${(c.groups||[]).length-4}</span>`:''}</div>
        <div class="text-xs mt-3 flex items-center justify-between" style="color:var(--muted)">
          <span>${c.refreshed_at?'🔄 อัปเดต '+fmtDate(c.refreshed_at):'ยังไม่มีข้อมูล'}</span>
          <span class="font-semibold" style="color:#2563eb">เปิดรายงาน →</span>
        </div>
      </a>
    </div>`;
}
let RENDERED=[]; // campaigns currently shown (for edit/delete lookup by key)
function renderCards(list, emptyHTML){
  RENDERED=list;
  const grid=document.getElementById('grid');
  if(!list.length){ grid.innerHTML=emptyHTML; return; }
  grid.innerHTML=list.map(cardHTML).join('');
}

// Edit a campaign (name / emoji / description). The ✏️ button sits outside the
// card's <a>, so a click never navigates — it opens the modal in edit mode.
document.getElementById('grid').addEventListener('click', (ev)=>{
  const btn=ev.target.closest('.edit-btn');
  if(!btn) return;
  ev.preventDefault(); ev.stopPropagation();
  const c=RENDERED.find(x=>x.key===btn.dataset.key);
  if(c) openEditModal(c);
});

// Delete a campaign (with confirmation). The 🗑 button sits outside the card's
// <a>, so a click never navigates — we still confirm before hitting the API.
document.getElementById('grid').addEventListener('click', async (ev)=>{
  const btn=ev.target.closest('.del-btn');
  if(!btn) return;
  ev.preventDefault(); ev.stopPropagation();
  const key=btn.dataset.key, name=btn.dataset.name;
  if(!confirm(`ต้องการลบแคมเปญ "${name}" (/c/${key}) ออกจากระบบใช่ไหม?\n\nแคมเปญจะหายไปจากหน้า Home ทันที (ข้อมูล KOL ยังถูกเก็บไว้ในระบบ กู้คืนได้ภายหลัง)`)) return;
  btn.disabled=true; const old=btn.textContent; btn.textContent='⏳';
  try{
    const r=await fetch('/api/campaigns/'+encodeURIComponent(key),{method:'DELETE'});
    const d=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(d.detail||('HTTP '+r.status));
    toast(`ลบแคมเปญ "${name}" แล้ว`);
    loadGrid(); // refresh grid + invalidate search cache
  }catch(e){ toast('ลบไม่สำเร็จ: '+e.message,false); btn.disabled=false; btn.textContent=old; }
});

let LATEST=[];        // 15 newest (default view)
let SEARCH_CACHE=null; // all campaigns (lazy-loaded on first search)

const EMPTY_DEFAULT='<div class="card p-8 text-center col-span-full"><div class="text-3xl mb-2">📭</div><div class="font-semibold mb-1">ยังไม่มีแคมเปญ</div><div class="text-sm mb-3" style="color:var(--muted)">กด "+ สร้างแคมเปญใหม่" ด้านบนเพื่อเริ่ม</div></div>';

async function loadGrid(){
  try{
    const d=await(await fetch('/api/campaigns?limit=15')).json();
    LATEST=d.campaigns||[];
    SEARCH_CACHE=null; // invalidate after any create so search re-fetches
    renderCards(LATEST, EMPTY_DEFAULT);
  }catch(e){document.getElementById('grid').innerHTML='<div class="card p-6 col-span-full" style="color:#dc2626">โหลดไม่สำเร็จ: '+esc(e.message)+'</div>';}
}

async function ensureSearchCache(){
  if(SEARCH_CACHE) return SEARCH_CACHE;
  const d=await(await fetch('/api/campaigns?limit=100')).json();
  SEARCH_CACHE=d.campaigns||[];
  return SEARCH_CACHE;
}
async function runSearch(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const hint=document.getElementById('searchHint');
  if(!q){ hint.textContent=''; renderCards(LATEST, EMPTY_DEFAULT); return; }
  hint.textContent='กำลังค้นหา…';
  let all;
  try{ all=await ensureSearchCache(); }
  catch(e){ hint.textContent='ค้นหาไม่สำเร็จ: '+e.message; return; }
  const matches=all.filter(c=>
    (c.name||'').toLowerCase().includes(q) ||
    (c.key||'').toLowerCase().includes(q) ||
    (c.subtitle||'').toLowerCase().includes(q));
  hint.textContent=`พบ ${matches.length} แคมเปญ จากทั้งหมด ${all.length}`;
  renderCards(matches, `<div class="card p-8 text-center col-span-full"><div class="text-3xl mb-2">🔍</div><div class="font-semibold">ไม่พบแคมเปญที่ตรงกับ "${esc(q)}"</div></div>`);
}
{
  let t; const s=document.getElementById('search');
  s.addEventListener('input',()=>{ clearTimeout(t); t=setTimeout(runSearch,180); });
}

function renderEmojiPick(){
  const el=document.getElementById('fEmoji');
  el.innerHTML=EMOJIS.map(e=>`<button type="button" data-e="${e}" class="${e===pickedEmoji?'on':''}">${e}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{pickedEmoji=b.dataset.e;renderEmojiPick();});
}
let editingKey=null; // null = create mode, else the key being edited
function openModal(){
  editingKey=null;
  document.getElementById('modalTitle').textContent='🆕 สร้างแคมเปญใหม่';
  document.getElementById('createBtn').textContent='สร้าง';
  document.getElementById('createHint').style.display='';
  document.getElementById('fKeyWrap').style.display='none';
  document.getElementById('modalBack').style.display='flex';
  document.getElementById('fName').focus();
}
function openEditModal(c){
  editingKey=c.key;
  document.getElementById('modalTitle').textContent='✏️ แก้ไขแคมเปญ';
  document.getElementById('createBtn').textContent='บันทึก';
  document.getElementById('createHint').style.display='none';
  document.getElementById('fKeyWrap').style.display='';
  document.getElementById('fKey').value=c.key;
  document.getElementById('fName').value=c.name||'';
  document.getElementById('fSub').value=c.subtitle||'';
  pickedEmoji=c.emoji||'📊'; renderEmojiPick();
  document.getElementById('modalErr').textContent='';
  document.getElementById('modalBack').style.display='flex';
  document.getElementById('fName').focus();
}
function closeModal(){editingKey=null;document.getElementById('modalBack').style.display='none';['fName','fSub','fKey'].forEach(id=>document.getElementById(id).value='');pickedEmoji='📊';renderEmojiPick();document.getElementById('modalErr').textContent='';}
document.getElementById('newBtn').onclick=openModal;
document.getElementById('closeBtn').onclick=closeModal;
document.getElementById('cancelBtn').onclick=closeModal;
document.getElementById('modalBack').onclick=e=>{if(e.target.id==='modalBack')closeModal();};

document.getElementById('createBtn').onclick=async()=>{
  const name=document.getElementById('fName').value.trim();
  if(!name){document.getElementById('modalErr').textContent='ใส่ชื่อแคมเปญก่อน';return;}
  const body={
    name,
    emoji:pickedEmoji,
    subtitle:document.getElementById('fSub').value.trim(),
  };
  const cb=document.getElementById('createBtn');
  cb.disabled=true;
  try{
    if(editingKey){
      // ---- edit mode: rename key first (if changed), then PATCH the rest ----
      let targetKey=editingKey;
      const newKey=(document.getElementById('fKey').value||'').trim().toLowerCase();
      if(newKey && newKey!==editingKey){
        const rr=await fetch('/api/campaigns/'+encodeURIComponent(editingKey)+'/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({new_key:newKey})});
        const rd=await rr.json();
        if(!rr.ok){document.getElementById('modalErr').textContent=rd.detail||('HTTP '+rr.status);cb.disabled=false;return;}
        targetKey=rd.key;
      }
      const r=await fetch('/api/campaigns/'+encodeURIComponent(targetKey),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d=await r.json();
      if(!r.ok){document.getElementById('modalErr').textContent=d.detail||('HTTP '+r.status);cb.disabled=false;return;}
      toast('บันทึกแคมเปญ "'+d.name+'" แล้ว');
      closeModal(); cb.disabled=false;
      loadGrid();
    }else{
      // ---- create mode ----
      const r=await fetch('/api/campaigns',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d=await r.json();
      if(!r.ok){document.getElementById('modalErr').textContent=d.detail||('HTTP '+r.status);cb.disabled=false;return;}
      toast('สร้างแคมเปญ "'+d.name+'" แล้ว');
      closeModal(); cb.disabled=false;
      // Jump straight to the new campaign so the user can add KOLs
      setTimeout(()=>{location.href='/c/'+encodeURIComponent(d.key);},400);
    }
  }catch(e){document.getElementById('modalErr').textContent=e.message;cb.disabled=false;}
};

renderEmojiPick();
loadGrid();
</script></body></html>
